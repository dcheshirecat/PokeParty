name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Install Gradle 8.4 ───────────────────────────────────────────────
      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      # ── 4. Scaffold Android project ─────────────────────────────────────────
      - name: Create Android project structure
        run: |
          # ── Directories ──────────────────────────────────────────────────────
          mkdir -p app/src/main/java/com/pokemon/encounter
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          # ── Copy game into assets ─────────────────────────────────────────────
          cp index.html app/src/main/assets/game.html

          # ── settings.gradle ───────────────────────────────────────────────────
          cat > settings.gradle << 'EOF'
          rootProject.name = "PokemonEncounter"
          include ':app'
          EOF

          # ── Root build.gradle ─────────────────────────────────────────────────
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # ── app/build.gradle ──────────────────────────────────────────────────
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.pokemon.encounter'
              defaultConfig {
                  applicationId "com.pokemon.encounter"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile     file(System.getenv("KEYSTORE_PATH") ?: "release.keystore")
                      storePassword System.getenv("KEYSTORE_PASS") ?: "pokemon123"
                      keyAlias      System.getenv("KEY_ALIAS")     ?: "pokemon-key"
                      keyPassword   System.getenv("KEY_PASS")      ?: "pokemon123"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          # ── AndroidManifest.xml ───────────────────────────────────────────────
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.pokemon.encounter">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="Pokémon Encounter"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:hardwareAccelerated="true"
                  android:usesCleartextTraffic="true"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ── MainActivity.java ─────────────────────────────────────────────────
          cat > app/src/main/java/com/pokemon/encounter/MainActivity.java << 'EOF'
          package com.pokemon.encounter;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              private WebView webView;
              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/game.html");
              }
              @Override public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack(); else super.onBackPressed();
              }
              @Override protected void onPause()   { super.onPause();   webView.onPause(); }
              @Override protected void onResume()  { super.onResume();  webView.onResume(); }
              @Override protected void onDestroy() { webView.destroy(); super.onDestroy(); }
          }
          EOF

          # ── Launcher icon (Poké Ball — paths only, no rect/circle tags) ─────────
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <!-- Top half red -->
              <path android:fillColor="#E53935"
                  android:pathData="M54,20 A34,34 0 0,1 88,54 L20,54 A34,34 0 0,1 54,20 Z"/>
              <!-- Bottom half white -->
              <path android:fillColor="#FAFAFA"
                  android:pathData="M20,54 A34,34 0 0,0 88,54 Z"/>
              <!-- Centre divider band (rect as path) -->
              <path android:fillColor="#212121"
                  android:pathData="M20,52 L88,52 L88,56 L20,56 Z"/>
              <!-- Centre button outer (circle as path) -->
              <path android:fillColor="#212121"
                  android:pathData="M54,44 A10,10 0 1,1 53.999,44 Z"/>
              <!-- Centre button inner -->
              <path android:fillColor="#FAFAFA"
                  android:pathData="M54,48 A6,6 0 1,1 53.999,48 Z"/>
              <!-- Glint -->
              <path android:fillColor="#CCFFFFFF"
                  android:pathData="M62,28 A4,4 0 1,1 61.999,28 Z"/>
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
             app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#0D0D1A</color>
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Pokémon Encounter</string>
          </resources>
          EOF

      # ── 5. Generate single-use keystore ─────────────────────────────────────
      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias pokemon-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -keystore ${{ github.workspace }}/release.keystore \
            -storepass pokemon123 \
            -keypass   pokemon123 \
            -dname "CN=Pokemon Encounter, OU=Game, O=Personal, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      # ── 6. Build release APK ─────────────────────────────────────────────────
      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASS: pokemon123
          KEY_ALIAS:     pokemon-key
          KEY_PASS:      pokemon123
        run: |
          gradle assembleRelease --no-daemon --stacktrace

      # ── 7. Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokemonEncounter-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
